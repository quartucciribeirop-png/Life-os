<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>Life OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;height:100%;overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* LOADING */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
.load-logo{font-family:'Rajdhani',sans-serif;font-size:48px;font-weight:700;letter-spacing:8px}
.load-logo span{color:#ff1a1a}
.load-bar{width:180px;height:3px;background:#111;border-radius:2px;margin-top:28px;overflow:hidden}
.load-fill{height:100%;background:#ff1a1a;border-radius:2px;animation:loadbar 2s ease forwards}
.load-sub{font-size:10px;color:#333;letter-spacing:3px;margin-top:12px;font-family:'JetBrains Mono',monospace}
@keyframes loadbar{from{width:0}to{width:100%}}

/* SCREENS */
.screen{flex:1;overflow-y:auto;padding-bottom:85px;animation:fadeIn .25s ease}
.screen::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 15px #ff1a1a33}50%{box-shadow:0 0 30px #ff1a1a77}}
@keyframes glowG{0%,100%{box-shadow:0 0 10px #00ff8822}50%{box-shadow:0 0 20px #00ff8855}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
.login-logo{font-family:'Rajdhani',sans-serif;font-size:42px;font-weight:700;letter-spacing:8px;margin-bottom:8px}
.login-logo span{color:#ff1a1a}
.login-sub{font-size:11px;color:#333;letter-spacing:3px;font-family:'JetBrains Mono',monospace;margin-bottom:48px}
.profile-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}
.profile-card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.profile-card:active{transform:scale(.97)}
.profile-card.david{border-color:#ff1a1a33}
.profile-card.david:hover{border-color:#ff1a1a66;background:#110000}
.profile-card.pietro{border-color:#0088ff33}
.profile-card.pietro:hover{border-color:#0088ff66;background:#000d1a}
.profile-card.startup{border-color:#00ff8833}
.profile-card.startup:hover{border-color:#00ff8866;background:#001a0d}
.profile-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px}
.profile-desc{font-size:11px;color:#555;font-family:'JetBrains Mono',monospace;margin-top:2px}
.profile-arrow{color:#333;font-size:18px}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:101;padding:24px}
.pin-title{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;margin-bottom:6px}
.pin-sub{font-size:12px;color:#555;font-family:'JetBrains Mono',monospace;margin-bottom:40px}
.pin-dots{display:flex;gap:16px;margin-bottom:40px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #333;transition:all .2s}
.pin-dot.filled{background:#ff1a1a;border-color:#ff1a1a;box-shadow:0 0 8px #ff1a1a66}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px}
.pin-btn{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:14px;height:64px;font-size:22px;font-weight:600;color:#fff;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.pin-btn:active{background:#1a1a1a;transform:scale(.94)}
.pin-btn.del{font-size:16px;color:#555}
.pin-btn.empty{background:transparent;border:none;cursor:default}
.pin-error{color:#ff4444;font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:16px;animation:pulse .5s ease}
.pin-back{position:absolute;top:48px;left:20px;background:none;border:none;color:#555;cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px}

/* HEADER */
.hdr{background:#000;padding:44px 16px 12px;border-bottom:1px solid #0d0d0d;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;letter-spacing:3px}
.logo-r{color:#ff1a1a}
.user-badge{display:flex;align-items:center;gap:6px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:20px;padding:4px 10px;cursor:pointer}
.user-badge span{font-size:10px;font-family:'JetBrains Mono',monospace;color:#888}

/* TABS */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #1a1a1a;background:transparent;color:#444;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s}
.tab.on{background:#ff1a1a22;border-color:#ff1a1a55;color:#ff1a1a}
.tab.on.blue{background:#0088ff22;border-color:#0088ff55;color:#0088ff}
.tab.on.green{background:#00ff8822;border-color:#00ff8855;color:#00ff88}

/* CARDS */
.pad{padding:14px}
.card{background:#0d0d0d;border:1px solid #111;border-radius:14px;padding:14px;margin-bottom:10px}
.card-red{background:linear-gradient(135deg,#130000,#080808);border:1px solid #ff1a1a22;border-radius:14px;padding:14px;margin-bottom:10px;animation:glow 3s ease-in-out infinite}
.card-blue{background:linear-gradient(135deg,#00091a,#080808);border:1px solid #0088ff22;border-radius:14px;padding:14px;margin-bottom:10px}
.card-green{background:linear-gradient(135deg,#001a09,#080808);border:1px solid #00ff8822;border-radius:14px;padding:14px;margin-bottom:10px;animation:glowG 3s ease-in-out infinite}
.sec{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;color:#333;margin:14px 0 8px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:#0d0d0d}

/* TYPOGRAPHY */
.mono{font-family:'JetBrains Mono',monospace}
.raj{font-family:'Rajdhani',sans-serif;font-weight:700}
.big{font-size:30px;font-weight:700;line-height:1.1}
.med{font-size:20px;font-weight:700}
.sm{font-size:11px;color:#555}
.lbl{font-size:10px;font-weight:600;color:#444;letter-spacing:1.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:5px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.b-red{background:#ff1a1a22;color:#ff1a1a;border:1px solid #ff1a1a44}
.b-green{background:#00ff8822;color:#00ff88;border:1px solid #00ff8844}
.b-blue{background:#0088ff22;color:#0088ff;border:1px solid #0088ff44}
.b-yellow{background:#ffcc0022;color:#ffcc00;border:1px solid #ffcc0044}
.b-purple{background:#aa00ff22;color:#aa00ff;border:1px solid #aa00ff44}
.b-orange{background:#ff660022;color:#ff6600;border:1px solid #ff660044}

/* PROGRESS */
.ptrack{height:4px;background:#111;border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.ptrack-lg{height:7px;background:#111;border-radius:4px;overflow:hidden}
.pfill-lg{height:100%;border-radius:4px;transition:width .8s}

/* LIST */
.row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #0a0a0a}
.row:last-child{border:none}
.ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* BUTTONS */
.btn{background:#ff1a1a;color:#fff;border:none;border-radius:11px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:'Inter',sans-serif;transition:all .15s;margin-top:6px}
.btn:active{transform:scale(.97);opacity:.9}
.btn-blue{background:#0088ff}
.btn-green{background:#00cc66}
.btn-o{background:#0d0d0d;color:#888;border:1px solid #1a1a1a;border-radius:11px;padding:12px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-o:hover{background:#111;color:#fff}
.btn-sm{background:#ff1a1a;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-sm-blue{background:#0088ff}
.btn-sm-green{background:#00cc66}
.btn-sm-o{background:transparent;color:#555;border:1px solid #1a1a1a;border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.btn-icon{background:none;border:none;cursor:pointer;color:#444;padding:4px;display:inline-flex;align-items:center;transition:color .2s}
.btn-icon:hover{color:#fff}
.btn-icon.del:hover{color:#ff4444}

/* INPUT */
.inp{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:12px 13px;color:#fff;font-size:14px;width:100%;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
.inp:focus{border-color:#ff1a1a44}
.inp::placeholder{color:#2a2a2a}
.sel{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:12px 13px;color:#fff;font-size:14px;width:100%;outline:none;font-family:'Inter',sans-serif;appearance:none;cursor:pointer}
.inp-row{margin-bottom:12px}
.inp-row .lbl{margin-bottom:5px;display:block}
.textarea{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:12px 13px;color:#fff;font-size:14px;width:100%;outline:none;font-family:'Inter',sans-serif;resize:none;min-height:80px}
.textarea:focus{border-color:#ff1a1a44}
.textarea::placeholder{color:#2a2a2a}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#080808;border:1px solid #1a1a1a;border-radius:22px 22px 0 0;padding:20px 16px 36px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px}
.close-btn{background:#111;border:1px solid #222;color:#666;cursor:pointer;font-size:18px;line-height:1;padding:4px 8px;border-radius:8px}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(4,4,4,.98);border-top:1px solid #0d0d0d;display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 8px;border:none;background:transparent;color:#2a2a2a;cursor:pointer;transition:color .2s;min-width:44px}
.ni.on{color:#ff1a1a}
.ni.on.blue{color:#0088ff}
.ni.on.green{color:#00ff88}
.ni svg{width:19px;height:19px}
.ni span{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}

/* FAB */
.fab{position:fixed;bottom:82px;right:16px;width:48px;height:48px;border-radius:50%;background:#ff1a1a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px #ff1a1a44;z-index:99;animation:glow 2s ease-in-out infinite;transition:transform .2s}

/* SCORE RING */
.ring-wrap{position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-wrap svg{position:absolute}
.ring-inner{text-align:center;z-index:1}
.ring-num{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;line-height:1}
.ring-lbl{font-size:9px;color:#444;font-family:'JetBrains Mono',monospace;letter-spacing:1px}

/* MISC */
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;background:#111;color:#555;border:1px solid #1a1a1a;font-family:'JetBrains Mono',monospace}
.divider{height:1px;background:#0d0d0d;margin:12px 0}
.empty-state{text-align:center;padding:40px 20px;color:#2a2a2a}
.empty-state .emoji{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:13px;font-family:'JetBrains Mono',monospace}
.empty-state .sub{font-size:11px;margin-top:6px;color:#1a1a1a}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col .bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.bar-col .blbl{font-size:9px;color:#333;font-family:'JetBrains Mono',monospace}
.drops{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.drop{width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:none;cursor:pointer;transition:all .3s}
.drop.on{background:#0088ff;box-shadow:0 0 10px #0088ff55}
.drop.off{background:#0d0d0d;border:1px solid #1a1a1a}
.streak{display:flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#ff6600}
.tag{display:inline-flex;padding:2px 7px;border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600}
.tag-red{background:#ff1a1a22;color:#ff1a1a}
.tag-green{background:#00ff8822;color:#00ff88}
.tag-yellow{background:#ffcc0022;color:#ffcc00}
.tag-blue{background:#0088ff22;color:#0088ff}
.tag-gray{background:#1a1a1a;color:#666}
.car-status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'JetBrains Mono',monospace}
.notification-banner{background:#ff1a1a11;border:1px solid #ff1a1a33;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer}
</style>
</head>
<body>
<div id="loading">
  <div class="load-logo">LIFE<span> OS</span></div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-sub">INICIALIZANDO SISTEMA...</div>
</div>

<div id="login-screen" style="display:none">
  <div class="login-logo">LIFE<span> OS</span></div>
  <div class="login-sub">SELECIONE SEU PERFIL</div>
  <div class="profile-cards">
    <div class="profile-card david" onclick="selectProfile('david')">
      <div class="profile-avatar" style="background:#ff1a1a22">👤</div>
      <div class="profile-info">
        <div class="profile-name" style="color:#ff1a1a">DAVID</div>
        <div class="profile-desc">Perfil pessoal</div>
      </div>
      <div class="profile-arrow">›</div>
    </div>
    <div class="profile-card pietro" onclick="selectProfile('pietro')">
      <div class="profile-avatar" style="background:#0088ff22">👤</div>
      <div class="profile-info">
        <div class="profile-name" style="color:#0088ff">PIETRO</div>
        <div class="profile-desc">Perfil pessoal + Empréstimos</div>
      </div>
      <div class="profile-arrow">›</div>
    </div>
    <div class="profile-card startup" onclick="selectProfile('startup')">
      <div class="profile-avatar" style="background:#00ff8822">🚗</div>
      <div class="profile-info">
        <div class="profile-name" style="color:#00ff88">STARTUP</div>
        <div class="profile-desc">Empresa compartilhada</div>
      </div>
      <div class="profile-arrow">›</div>
    </div>
  </div>
</div>

<div id="pin-screen" style="display:none">
  <button class="pin-back" onclick="backToLogin()">‹ Voltar</button>
  <div class="pin-title" id="pin-title">DAVID</div>
  <div class="pin-sub" id="pin-sub">Digite sua senha</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinInput('1')">1</button>
    <button class="pin-btn" onclick="pinInput('2')">2</button>
    <button class="pin-btn" onclick="pinInput('3')">3</button>
    <button class="pin-btn" onclick="pinInput('4')">4</button>
    <button class="pin-btn" onclick="pinInput('5')">5</button>
    <button class="pin-btn" onclick="pinInput('6')">6</button>
    <button class="pin-btn" onclick="pinInput('7')">7</button>
    <button class="pin-btn" onclick="pinInput('8')">8</button>
    <button class="pin-btn" onclick="pinInput('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinInput('0')">0</button>
    <button class="pin-btn del" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error" style="display:none">Senha incorreta</div>
</div>

<div id="app" style="display:none">
  <div id="screen" class="screen"></div>
  <nav class="nav" id="nav"></nav>
  <button class="fab" id="fab" onclick="toggleFab()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════
const STORE_KEY = 'lifeos_v1';

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
}
function saveStore(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
}

let STORE = loadStore();

function getProfile(profile) {
  if (!STORE[profile]) STORE[profile] = {};
  return STORE[profile];
}
function saveProfile(profile, data) {
  STORE[profile] = data;
  saveStore(STORE);
}

// Auth
function getPins() { return STORE._pins || {}; }
function savePin(profile, pin) { if(!STORE._pins) STORE._pins={}; STORE._pins[profile]=pin; saveStore(STORE); }
function hasPin(profile) { return !!getPins()[profile]; }
function checkPin(profile, pin) { return getPins()[profile] === pin; }

// ═══════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════
let S = {
  profile: null,
  screen: 'dash',
  tab: {},
  modal: null,
  editing: null,
  fabOpen: false,
  pinEntry: '',
  pinMode: 'check', // check | set
  pendingProfile: null,
};

function getData() { return getProfile(S.profile) || {}; }
function setData(key, val) {
  const d = getProfile(S.profile);
  d[key] = val;
  saveProfile(S.profile, d);
}
function getKey(key, def) {
  const d = getData();
  return d[key] !== undefined ? d[key] : def;
}

// ═══════════════════════════════════════════════════════
// AUTH FLOW
// ═══════════════════════════════════════════════════════
function selectProfile(profile) {
  S.pendingProfile = profile;
  S.pinEntry = '';
  const names = {david:'DAVID', pietro:'PIETRO', startup:'STARTUP'};
  $('pin-title').textContent = names[profile];

  if (!hasPin(profile)) {
    S.pinMode = 'set';
    $('pin-sub').textContent = 'Crie sua senha (4 dígitos)';
  } else {
    S.pinMode = 'check';
    $('pin-sub').textContent = 'Digite sua senha';
  }
  updatePinDots();
  $('pin-error').style.display = 'none';
  hide('login-screen');
  show('pin-screen');
}

function pinInput(digit) {
  if (S.pinEntry.length >= 4) return;
  S.pinEntry += digit;
  updatePinDots();
  if (S.pinEntry.length === 4) {
    setTimeout(() => {
      if (S.pinMode === 'set') {
        savePin(S.pendingProfile, S.pinEntry);
        enterApp(S.pendingProfile);
      } else {
        if (checkPin(S.pendingProfile, S.pinEntry)) {
          enterApp(S.pendingProfile);
        } else {
          $('pin-error').style.display = 'block';
          S.pinEntry = '';
          updatePinDots();
        }
      }
    }, 150);
  }
}

function pinDelete() {
  S.pinEntry = S.pinEntry.slice(0, -1);
  updatePinDots();
  $('pin-error').style.display = 'none';
}

function updatePinDots() {
  const dots = $$('.pin-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('filled', i < S.pinEntry.length);
  });
}

function backToLogin() {
  hide('pin-screen');
  show('login-screen');
  S.pinEntry = '';
}

function enterApp(profile) {
  S.profile = profile;
  S.screen = 'dash';
  S.tab = {};
  hide('pin-screen');
  show('app');
  render();
  requestNotificationPermission();
}

function logout() {
  S.profile = null;
  S.screen = 'dash';
  hide('app');
  show('login-screen');
}

// NOTIFICATIONS
// ═══════════════════════════════════════════════════════
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function scheduleNotification(title, body, dateTime) {
  if (!('Notification' in window)) return;
  const delay = new Date(dateTime) - new Date();
  if (delay <= 0) return;
  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification(title, { body, icon: '/icon.png' });
    }
  }, delay);
}

function render() {
  const screens = { dash, finance, study, health, gym, garage, loans, reading, routine, vision };
  const fn = screens[S.screen];
  $('screen').innerHTML = fn ? fn() : '';
  renderNav();
  if (S.modal) renderModal();
  else { const o=$('modal-overlay'); if(o) o.remove(); }
  const fm=$('fab-menu'); if(fm&&!S.fabOpen) fm.remove();
}

function scoreRing(score, color='#ff1a1a') {
  const r=43, circ=2*Math.PI*r, off=circ-(score/100)*circ;
  const col = score>=80?'#00ff88':score>=60?'#ffcc00':color;
  return `<div class="ring-wrap">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="#111" stroke-width="6"/>
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="6"
        stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
        stroke-linecap="round" transform="rotate(-90 50 50)"
        style="transition:stroke-dashoffset 1.2s;filter:drop-shadow(0 0 6px ${col}88)"/>
    </svg>
    <div class="ring-inner"><div class="ring-num">${score}</div><div class="ring-lbl">SCORE</div></div>
  </div>`;
}

function barChart(data, key, color, labelKey='day') {
  if (!data.length) return '<div class="sm" style="text-align:center;padding:20px">Sem dados</div>';
  const max = Math.max(...data.map(d=>Number(d[key])||0), 1);
  return `<div class="bar-chart">${data.map(d=>{
    const h = Math.max(Math.round((Number(d[key])/max)*80),4);
    return `<div class="bar-col"><div class="bar" style="height:${h}px;background:${color}"></div><div class="blbl">${d[labelKey]}</div></div>`;
  }).join('')}</div>`;
}

function fmtTimer(s) {
  return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

            ${v.deadline?`<div class="mono sm" style="margin-top:6px">📅 ${v.deadline}</div>`:''}
          </div>
          <button class="btn-icon del" onclick="deleteItem('visionBoard','${v.id}')">${icon(IC.trash,13,'#555')}</button>
        </div>
      </div>`).join('')}
  `:''}
  ${tab==='metas'?`
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn-sm" onclick="openModal('addGoal')" style="background:#aa00ff">+ Meta</button>

          <div style="flex:1">
            <div style="font-size:14px;font-weight:700">${g.title}</div>

          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="raj" style="font-size:24px;color:${g.color||'#aa00ff'}">${pct(g.cur||0,g.target||1)}%</div>
            <button class="btn-icon del" onclick="deleteItem('goals','${g.id}')">${icon(IC.trash,13,'#555')}</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
          <span class="mono" style="color:#777">${fmtN(g.cur||0)}${g.unit}</span>
          <span class="mono sm">${fmtN(g.target||0)}${g.unit}</span>

      </div>`).join('')}
  `:''}
  </div>`;
}

// NAV RENDER
// ═══════════════════════════════════════════════════════
function renderNav() {
  const isStartup = S.profile === 'startup';
  const isPietro = S.profile === 'pietro';
  const color = {david:'#ff1a1a', pietro:'#0088ff', startup:'#00ff88'}[S.profile];

  let navItems;
  if (isStartup) {
    navItems = [
      {id:'dash',label:'Home',ic:IC.home},
      {id:'garage',label:'Garage',ic:IC.car},
      {id:'vision',label:'Visão',ic:IC.star},
    ];
  } else {
    navItems = [
      {id:'dash',label:'Home',ic:IC.home},
      {id:'finance',label:'Finanças',ic:IC.wallet},
      {id:'health',label:'Saúde',ic:IC.heart},
      {id:'study',label:'Estudos',ic:IC.book},
      {id:'gym',label:'Gym',ic:IC.gym},
      {id:'reading',label:'Livros',ic:IC.journal},
      {id:'routine',label:'Rotina',ic:IC.routine},
      {id:'vision',label:'Sonhos',ic:IC.star},
      ...(isPietro?[{id:'loans',label:'Crédito',ic:IC.money}]:[]),
      {id:'garage',label:'Startup',ic:IC.car},
    ];
  }

  $('nav').innerHTML = navItems.map(n=>`
    <button class="ni ${S.screen===n.id?'on':''}" onclick="go('${n.id}')">
      ${icon(n.ic,19,S.screen===n.id?color:'#2a2a2a')}
      <span>${n.label}</span>
    </button>`).join('');
}

        <div class="inp-row"><div class="lbl">Status</div><select class="sel" id="m-status"><option ${e?.status==='para ler'?'selected':''}>para ler</option><option ${e?.status==='lendo'?'selected':''}>lendo</option><option ${e?.status==='lido'?'selected':''}>lido</option></select></div>
        <button class="btn" style="background:#ffcc00;color:#000" onclick="saveBook('${e?e.id:''}')">${e?'Salvar':'Adicionar'} Livro</button>`;
      break;
    }
    case 'editBook': html=''; S.modal='addBook'; renderModal(); return;
    case 'addRoutineItem': {
      html = `<div class="modal-hdr"><div class="modal-title">ITEM DA ROTINA</div><button class="close-btn" onclick="closeModal()">×</button></div>
        <div class="inp-row"><div class="lbl">Horário</div><input class="inp" type="time" id="m-time"></div>
        <div class="inp-row"><div class="lbl">Título</div><input class="inp" id="m-title" placeholder="Ex: Academia"></div>
        <div class="inp-row"><div class="lbl">Descrição</div><input class="inp" id="m-desc" placeholder="Detalhes..."></div>
        <button class="btn" onclick="saveRoutineItem()">Adicionar à Rotina</button>`;
      break;
    }
    case 'addJournal': {
      html = `<div class="modal-hdr"><div class="modal-title">NOVO REGISTRO</div><button class="close-btn" onclick="closeModal()">×</button></div>
        <div class="inp-row"><div class="lbl">Como você está?</div>
          <div style="display:flex;gap:10px;margin-bottom:12px">
            ${['😊','😐','😔','😤','🔥'].map(m=>`<button onclick="document.getElementById('m-mood').value='${m}';$$('.mood-btn').forEach(b=>b.style.opacity='.4');this.style.opacity='1'" class="mood-btn" style="font-size:24px;background:none;border:none;cursor:pointer;opacity:.4">${m}</button>`).join('')}
          </div>
          <input type="hidden" id="m-mood">
        </div>
        <div class="inp-row"><div class="lbl">Registro do dia</div><textarea class="textarea" id="m-content" placeholder="Como foi seu dia? Conquistas, aprendizados..." style="min-height:120px"></textarea></div>
        <button class="btn" onclick="saveJournal()">Salvar Registro</button>`;
      break;
    }
    case 'addVisionItem': {
      html = `<div class="modal-hdr"><div class="modal-title">NOVO SONHO</div><button class="close-btn" onclick="closeModal()">×</button></div>
        <div class="inp-row"><div class="lbl">Emoji</div><input class="inp" id="m-emoji" placeholder="🌟" value="🌟"></div>
        <div class="inp-row"><div class="lbl">Título</div><input class="inp" id="m-title" placeholder="Ex: Montar a maior empresa de customização"></div>
        <div class="inp-row"><div class="lbl">Descrição</div><textarea class="textarea" id="m-desc" placeholder="Descreva seu sonho em detalhes..."></textarea></div>
        <div class="inp-row"><div class="lbl">Prazo</div><input class="inp" type="date" id="m-deadline"></div>
        <button class="btn" style="background:#aa00ff" onclick="saveVisionItem()">Adicionar Sonho</button>`;
      break;
    }
    case 'addGoal': {
      html = `<div class="modal-hdr"><div class="modal-title">NOVA META</div><button class="close-btn" onclick="closeModal()">×</button></div>
        <div class="inp-row"><div class="lbl">Título</div><input class="inp" id="m-title" placeholder="Ex: Faturar R$50k"></div>
        <div class="g2" style="gap:8px">
          <div class="inp-row"><div class="lbl">Meta</div><input class="inp" type="number" id="m-target" placeholder="50000"></div>
          <div class="inp-row"><div class="lbl">Unidade</div><input class="inp" id="m-unit" placeholder="R$, kg, h..."></div>
        </div>
        <div class="g2" style="gap:8px">
          <div class="inp-row"><div class="lbl">Progresso atual</div><input class="inp" type="number" id="m-cur" placeholder="0"></div>
          <div class="inp-row"><div class="lbl">Período</div><select class="sel" id="m-period"><option>anual</option><option>mensal</option><option>semanal</option></select></div>
        </div>
        <div class="inp-row"><div class="lbl">Categoria</div><select class="sel" id="m-cat"><option>Finanças</option><option>Educação</option><option>Saúde</option><option>Academia</option><option>Carreira</option><option>Empresa</option><option>Pessoal</option></select></div>
        <div class="inp-row"><div class="lbl">Cor</div><select class="sel" id="m-color"><option value="#ff1a1a">Vermelho</option><option value="#0088ff">Azul</option><option value="#00ff88">Verde</option><option value="#aa00ff">Roxo</option><option value="#ffcc00">Amarelo</option></select></div>
        <button class="btn" style="background:#aa00ff" onclick="saveGoal()">Criar Meta</button>`;
      break;
    }
  }

  let overlay = $('modal-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.className = 'overlay';
    overlay.onclick = e => { if(e.target===overlay) closeModal(); };
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `<div class="modal">${html}</div>`;
}

// ═══════════════════════════════════════════════════════
// SAVE ACTIONS
// ═══════════════════════════════════════════════════════
function v(id) { const el=document.getElementById(id); return el?el.value:''; }

function saveAccount() {
  const list = getKey('accounts',[]);
  const e = S.editing ? list.find(i=>i.id===S.editing) : null;
  if (e) {
    e.name=v('m-name'); e.type=v('m-type'); e.balance=parseFloat(v('m-bal'))||0; e.color=v('m-color');
  } else {
    if(!v('m-name')) return;
    list.unshift({id:uid(),name:v('m-name'),type:v('m-type'),balance:parseFloat(v('m-bal'))||0,color:v('m-color')});
  }
  setData('accounts',list); closeModal();
}

function saveTx() {
  if(!v('m-desc')||!v('m-amount')) return;
  const type = v('m-txtype');
  const amount = type==='expense'?-Math.abs(parseFloat(v('m-amount'))):Math.abs(parseFloat(v('m-amount')));
  const txs = getKey('transactions',[]);
  txs.unshift({id:uid(),desc:v('m-desc'),amount,cat:v('m-cat'),date:todayISO(),acc:v('m-acc')});
  setData('transactions',txs);
  const accounts = getKey('accounts',[]);
  const acc = accounts.find(a=>a.id===v('m-acc'));
  if(acc){acc.balance+=amount; setData('accounts',accounts);}
  closeModal();
}

function saveSubject() {
  if(!v('m-name')) return;
  const list = getKey('subjects',[]);
  list.push({id:uid(),name:v('m-name'),goal:parseFloat(v('m-goal'))||5,color:v('m-color'),hrs:0,streak:0});
  setData('subjects',list); closeModal();
}

function saveSession() {
  if(!v('m-sub')) return;
  const sessions = getKey('studySessions',[]);
  const dur = parseInt(v('m-dur'))||60;
  sessions.unshift({id:uid(),sub:v('m-sub'),dur,notes:v('m-notes'),date:todayISO()});
  setData('studySessions',sessions);
  const subs = getKey('subjects',[]);
  const sub = subs.find(s=>s.name===v('m-sub'));
  if(sub){sub.hrs=(sub.hrs||0)+dur/60; sub.streak=(sub.streak||0)+1; setData('subjects',subs);}
  closeModal();
}

function saveFlashcard() {
  if(!v('m-q')) return;
  const list = getKey('flashcards',[]);
  list.push({id:uid(),q:v('m-q'),a:v('m-a'),open:false});
  setData('flashcards',list); closeModal();
}

function saveNote() {
  if(!v('m-title')) return;
  const list = getKey('studyNotes',[]);
  list.unshift({id:uid(),title:v('m-title'),subject:v('m-sub'),content:v('m-content'),date:todayISO()});
  setData('studyNotes',list); closeModal();
}

function saveHabit() {
  if(!v('m-name')) return;
  const list = getKey('habits',[]);
  list.push({id:uid(),name:v('m-name'),icon:v('m-icon')||'⭐',cat:v('m-cat'),streak:0,done:false});
  setData('habits',list); closeModal();
}

function saveFood() {
  if(!v('m-name')) return;
  const list = getKey('foodLog',[]);
  list.unshift({id:uid(),name:v('m-name'),emoji:v('m-emoji'),cal:parseInt(v('m-cal'))||0,time:v('m-time'),date:todayISO()});
  setData('foodLog',list); closeModal();
}

let exerciseFields = [];
function addExerciseField() {
  exerciseFields.push({name:'',sets:[{r:'',w:''}]});
  const container = document.getElementById('exercises-list');
  if(!container) return;
  const idx = exerciseFields.length-1;
  const div = document.createElement('div');
  div.className='card';div.style.marginBottom='8px';
  div.innerHTML=`<input class="inp" placeholder="Nome do exercício" id="ex-name-${idx}" style="margin-bottom:8px">
    <div id="sets-${idx}">
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:4px">
        <div class="lbl">Reps</div><div class="lbl">Kg</div><div></div>
      </div>
      <div id="set-rows-${idx}"></div>
    </div>
    <button onclick="addSetField(${idx})" style="background:none;border:1px solid #1a1a1a;border-radius:8px;color:#555;cursor:pointer;padding:6px 12px;font-size:12px;width:100%;margin-top:6px">+ Série</button>`;
  container.appendChild(div);
  addSetField(idx);
}

function addSetField(exIdx) {
  const container = document.getElementById(`set-rows-${exIdx}`);
  if(!container) return;
  const setIdx = container.children.length;
  const div = document.createElement('div');
  div.style.cssText='display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px';
  div.innerHTML=`<input class="inp" type="number" id="ex-${exIdx}-r-${setIdx}" placeholder="12"><input class="inp" type="number" id="ex-${exIdx}-w-${setIdx}" placeholder="60"><span style="display:flex;align-items:center;color:#444;font-size:12px">#${setIdx+1}</span>`;
  container.appendChild(div);
}

function saveWorkout() {
  if(!v('m-name')) return;
  const exercises = exerciseFields.map((_, idx) => {
    const name = v(`ex-name-${idx}`);
    const sets=[];
    let si=0;
    while(document.getElementById(`ex-${idx}-r-${si}`)){
      sets.push({r:parseInt(v(`ex-${idx}-r-${si}`))||0,w:parseFloat(v(`ex-${idx}-w-${si}`))||0});
      si++;
    }
    return {name,sets};
  }).filter(e=>e.name);
  const list = getKey('workouts',[]);
  list.unshift({id:uid(),name:v('m-name'),date:v('m-date')||todayISO(),dur:parseInt(v('m-dur'))||60,exercises});
  setData('workouts',list);
  exerciseFields=[];
  closeModal();
}

function saveCar(existingId) {
  const sd = getProfile('startup');
  if(!sd.cars) sd.cars=[];
  const car = {
    id:existingId||uid(),name:v('m-name'),model:v('m-model'),year:v('m-year'),
    buyPrice:parseFloat(v('m-buy'))||0,reformCost:parseFloat(v('m-reform'))||0,
    salePrice:parseFloat(v('m-sell'))||0,status:v('m-status'),deadline:v('m-deadline')
  };
  if(existingId){const i=sd.cars.findIndex(c=>c.id===existingId);if(i>-1)sd.cars[i]=car;}
  else sd.cars.unshift(car);
  if(car.deadline){scheduleNotification(`🚗 ${car.name}`,`Prazo de entrega chegando!`,car.deadline+'T09:00');}
  saveProfile('startup',sd); closeModal();
}

function saveMeeting() {
  if(!v('m-title')) return;

  if(!sd.meetings) sd.meetings=[];
  const m = {id:uid(),title:v('m-title'),datetime:v('m-datetime'),agenda:v('m-agenda')};
  sd.meetings.unshift(m);
  if(m.datetime){scheduleNotification(`📅 ${m.title}`,'Reunião em breve!',m.datetime);}
  saveProfile('startup',sd); closeModal();
}

function saveCalendarEvent() {

function savePortfolio() {

function saveLoan(existingId) {
  if(!v('m-client')||!v('m-amount')) return;
  const list = getKey('loans',[]);
  const amount = parseFloat(v('m-amount'))||0;
  const interest = parseFloat(v('m-interest'))||0;
  const totalReceive = amount + (amount * interest/100);
  const loan = {
    id:existingId||uid(),clientName:v('m-client'),clientContact:v('m-contact'),
    amount,interest,totalReceive,dueDate:v('m-due'),status:v('m-status'),
    score:parseInt(v('m-score'))||3,notes:v('m-notes')
  };
  if(existingId){const i=list.findIndex(l=>l.id===existingId);if(i>-1)list[i]=loan;}
  else list.unshift(loan);
  if(loan.dueDate){scheduleNotification(`💰 ${loan.clientName}`,`Vencimento do empréstimo chegando!`,loan.dueDate+'T09:00');}
  setData('loans',list); closeModal();
}

function saveBook(existingId) {

  if(existingId){const i=list.findIndex(b=>b.id===existingId);if(i>-1)list[i]=book;}
  else list.unshift(book);

}

// ═══════════════════════════════════════════════════════
// INTERACTIVE ACTIONS
// ═══════════════════════════════════════════════════════
function toggleHabit(id) {
  const list = getKey('habits',[]);
  const h = list.find(x=>x.id===id);
  if(h){h.done=!h.done;h.streak=h.done?(h.streak||0)+1:Math.max(0,(h.streak||1)-1);}
  setData('habits',list); render();
}

function toggleWater(i) {
  let w = getKey('water',0);
  const wg = getKey('waterGoal',8);
  w = i+1<=w?i:i+1;
  setData('water',w); render();
}

function setWaterGoal() {
  const g = parseInt(document.getElementById('water-goal-inp')?.value)||8;
  setData('waterGoal',g); render();
}

function toggleWorkoutExpand(id) {
  S.expandedWorkout = S.expandedWorkout===id?null:id;
  render();
}

function toggleFlashcard(id) {
  const list = getKey('flashcards',[]);
  const f = list.find(x=>x.id===id);
  if(f) f.open=!f.open;
  setData('flashcards',list); render();
}

function updatePage(bookId) {
  const page = parseInt(document.getElementById(`page-inp-${bookId}`)?.value)||0;
  const list = getKey('books',[]);
  const b = list.find(x=>x.id===bookId);
  if(b){b.currentPage=page; if(page>=(b.totalPages||0)&&b.totalPages>0)b.status='lido';}
  setData('books',list); render();
}

function calcIMC() {
  const peso = parseFloat(document.getElementById('imc-peso')?.value)||0;
  const alt = parseFloat(document.getElementById('imc-alt')?.value)||0;
  if(!peso||!alt) return;
  const h = alt/100;
  const result = (peso/(h*h)).toFixed(1);
  setData('imc',{peso,alt,result}); render();
}

function calcReform() {
  const buy = parseFloat(document.getElementById('calc-buy')?.value)||0;
  const reform = parseFloat(document.getElementById('calc-reform')?.value)||0;
  const sell = parseFloat(document.getElementById('calc-sell')?.value)||0;
  const profit = sell - buy - reform;
  const el = document.getElementById('calc-result');
  if(el) {el.textContent=fmtR(profit); el.style.color=profit>=0?'#00ff88':'#ff4444';}
}

function deleteItem(key, id) {
  const list = getKey(key,[]);
  setData(key, list.filter(i=>i.id!==id));
  render();
}

function deleteGarageItem(key, id) {
  const sd = getProfile('startup');
  if(sd[key]) sd[key] = sd[key].filter(i=>i.id!==id);
  saveProfile('startup',sd);
  render();
}

// Timer
S.studyTimer = {running:false,secs:0,sub:''};
let timerInterval = null;

function setTimerSub(val) { S.studyTimer.sub=val; }

function toggleTimer() {
  if(S.studyTimer.running){
    clearInterval(timerInterval);
    S.studyTimer.running=false;
  } else {
    S.studyTimer.running=true;
    timerInterval=setInterval(()=>{
      S.studyTimer.secs++;
      const el=document.getElementById('timer-display');
      if(el){el.textContent=fmtTimer(S.studyTimer.secs);el.style.color='#ff1a1a';}
    },1000);
  }
  render();
}

function resetTimer() {
  clearInterval(timerInterval);
  S.studyTimer={running:false,secs:0,sub:''};
  render();
}

// FAB
function toggleFab() {
  S.fabOpen=!S.fabOpen;
  const fab=$('fab');
  fab.style.transform=S.fabOpen?'rotate(45deg)':'none';
  let menu=$('fab-menu');
  if(S.fabOpen){
    if(!menu){menu=document.createElement('div');menu.id='fab-menu';menu.style.cssText='position:fixed;bottom:136px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:98';document.body.appendChild(menu);}
    const actions = S.profile==='startup'
      ? [{l:'Carro',c:'#00cc66',fn:"openModal('addCar')"},{l:'Reunião',c:'#ffcc00',fn:"openModal('addMeeting')"},{l:'Fornecedor',c:'#0088ff',fn:"openModal('addSupplier')"}]
      : [{l:'Despesa',c:'#ff1a1a',fn:"openModal('addTx')"},{l:'Receita',c:'#00ff88',fn:"openModal('addTx')"},{l:'Hábito',c:'#00cc66',fn:"openModal('addHabit')"},{l:'Treino',c:'#aa00ff',fn:"openModal('addWorkout')"}];
    menu.innerHTML=actions.map(a=>`
      <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
        <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:4px 10px;font-size:11px;color:#666;font-family:'JetBrains Mono',monospace">${a.l}</div>
        <button onclick="${a.fn};S.fabOpen=false;toggleFab()" style="width:38px;height:38px;border-radius:50%;background:${a.c}22;border:1px solid ${a.c}55;cursor:pointer;color:${a.c};font-size:18px;display:flex;align-items:center;justify-content:center">+</button>
      </div>`).join('');
  } else {
    if(menu) menu.remove();
  }
}
